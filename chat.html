<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Ework Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f4f2;
      --bubble-io: #ffffff;
      --bubble-me: #8b1a3a;
      --text: #1a1a1a;
      --text-muted: #888;
      --border: #e0e0e0;
      --header: #8b1a3a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    .header {
      background: var(--header);
      color: white;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      padding-top: max(14px, env(safe-area-inset-top));
    }
    .header-avatar {
      width: 38px; height: 38px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    .header-info { flex: 1; }
    .header-name { font-size: 1rem; font-weight: 600; }
    .header-status { font-size: 0.72rem; opacity: 0.8; }
    .header-back { color: white; text-decoration: none; font-size: 0.85rem; opacity: 0.85; }

    /* MESSAGGI */
    .messaggi {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      -webkit-overflow-scrolling: touch;
    }

    .msg-wrap {
      display: flex;
      align-items: flex-end;
      gap: 6px;
    }
    .msg-wrap.me { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .msg-bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg-wrap.io .msg-bubble {
      background: var(--bubble-io);
      color: var(--text);
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    }
    .msg-wrap.me .msg-bubble {
      background: var(--bubble-me);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg-time {
      font-size: 0.62rem;
      color: var(--text-muted);
      margin-top: 3px;
      text-align: right;
    }
    .msg-wrap.io .msg-time { text-align: left; }

    .msg-group { display: flex; flex-direction: column; max-width: 78%; }
    .msg-wrap.me .msg-group { align-items: flex-end; }

    /* DATA SEPARATORE */
    .data-sep {
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin: 8px 0;
      background: var(--bg);
      padding: 2px 10px;
      border-radius: 10px;
      align-self: center;
    }

    /* LOADING */
    .typing {
      display: none;
      padding: 10px 14px;
      background: var(--bubble-io);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      width: fit-content;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    }
    .typing.visible { display: block; }
    .typing-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      background: #bbb;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* PLACEHOLDER */
    .placeholder-chat {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      margin: auto;
      padding: 40px 20px;
      line-height: 1.7;
    }
    .placeholder-chat .emoji { font-size: 2rem; display: block; margin-bottom: 12px; }

    /* INPUT BAR */
    .input-bar {
      background: white;
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      display: flex;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }
    .input-testo {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 0.92rem;
      font-family: inherit;
      color: var(--text);
      outline: none;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
    }
    .input-testo:focus { border-color: var(--header); }
    .btn-invia {
      width: 42px; height: 42px;
      background: var(--header);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .btn-invia:disabled { opacity: 0.4; }
    .btn-invia:not(:disabled):active { opacity: 0.8; }

    /* ERRORE */
    .errore-bar {
      display: none;
      background: #fdedec;
      color: #c0392b;
      font-size: 0.78rem;
      padding: 8px 16px;
      text-align: center;
    }
    .errore-bar.visible { display: block; }
  </style>
</head>
<body>

  <div class="header">
    <a class="header-back" href="index.html">←</a>
    <div class="header-avatar">🤖</div>
    <div class="header-info">
      <div class="header-name">Assistente Ework</div>
      <div class="header-status" id="statusBar">in ascolto…</div>
    </div>
  </div>

  <div class="errore-bar" id="erroreBar">Connessione a Supabase non riuscita. Riprova.</div>

  <div class="messaggi" id="messaggi">
    <div class="placeholder-chat">
      <span class="emoji">🤖</span>
      Scrivi un messaggio all'assistente.<br>
      Risponderà quando il Mac è attivo.
    </div>
  </div>

  <div class="input-bar">
    <textarea class="input-testo" id="inputTesto" placeholder="Scrivi un messaggio…" rows="1"></textarea>
    <button class="btn-invia" id="btnInvia" onclick="invia()">↑</button>
  </div>

  <script>
    const SUPABASE_URL = 'https://lbizlnuzlesrkvsobzqz.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_2Rd36YkPvlsQI1BkdY0PrQ_od0d115R';
    const HEADERS = {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };

    let ultimoId = 0;
    let polling = null;

    // Auto-resize textarea
    const input = document.getElementById('inputTesto');
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); invia(); }
    });

    async function caricaMessaggi() {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/messaggi?order=created_at.asc`, { headers: HEADERS });
        if (!res.ok) throw new Error();
        const data = await res.json();
        document.getElementById('erroreBar').classList.remove('visible');
        renderMessaggi(data);
        if (data.length > 0) ultimoId = data[data.length - 1].id;
      } catch {
        document.getElementById('erroreBar').classList.add('visible');
        document.getElementById('statusBar').textContent = 'errore connessione';
      }
    }

    async function pollaNuovi() {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/messaggi?id=gt.${ultimoId}&order=created_at.asc`, { headers: HEADERS });
        if (!res.ok) return;
        const data = await res.json();
        document.getElementById('erroreBar').classList.remove('visible');
        if (data.length > 0) {
          appendMessaggi(data);
          ultimoId = data[data.length - 1].id;
        }
      } catch {}
    }

    function renderMessaggi(lista) {
      const el = document.getElementById('messaggi');
      if (lista.length === 0) return;
      el.innerHTML = '';
      lista.forEach(m => el.appendChild(creaElemento(m)));
      scrollBottom();
    }

    function appendMessaggi(lista) {
      const el = document.getElementById('messaggi');
      lista.forEach(m => el.appendChild(creaElemento(m)));
      scrollBottom();
      document.getElementById('statusBar').textContent = 'in ascolto…';
    }

    const agentiInfo = {
      geggi:   { emoji: '🎯', nome: 'Geggi' },
      giarvis: { emoji: '🏡', nome: 'Giarvis' },
      chicca:  { emoji: '📱', nome: 'Chicca' },
    };

    function creaElemento(m) {
      const isMe = m.mittente === 'emanuela';
      const agente = agentiInfo[m.mittente];
      const wrap = document.createElement('div');
      wrap.className = 'msg-wrap ' + (isMe ? 'me' : 'io');

      const ora = new Date(m.created_at).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
      const avatar = agente ? agente.emoji : '🤖';
      const nome = agente ? agente.nome : m.mittente;

      wrap.innerHTML = `
        ${!isMe ? `<div class="msg-avatar" title="${nome}">${avatar}</div>` : ''}
        <div class="msg-group">
          ${!isMe ? `<div style="font-size:0.68rem;font-weight:600;color:var(--text-muted);margin-bottom:3px;padding-left:2px">${nome}</div>` : ''}
          <div class="msg-bubble">${m.testo.replace(/\n/g, '<br>')}</div>
          <div class="msg-time">${ora}</div>
        </div>
      `;
      return wrap;
    }

    function scrollBottom() {
      const el = document.getElementById('messaggi');
      el.scrollTop = el.scrollHeight;
    }

    async function invia() {
      const testo = input.value.trim();
      if (!testo) return;

      const btn = document.getElementById('btnInvia');
      btn.disabled = true;
      input.value = '';
      input.style.height = 'auto';

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/messaggi`, {
          method: 'POST',
          headers: HEADERS,
          body: JSON.stringify({ mittente: 'emanuela', testo, letto: false })
        });
        if (!res.ok) throw new Error();
        const [msg] = await res.json();
        const el = document.getElementById('messaggi');
        // rimuovi placeholder se presente
        const ph = el.querySelector('.placeholder-chat');
        if (ph) ph.remove();
        el.appendChild(creaElemento(msg));
        ultimoId = msg.id;
        scrollBottom();
        document.getElementById('statusBar').textContent = 'messaggio inviato…';
      } catch {
        document.getElementById('erroreBar').classList.add('visible');
        input.value = testo;
      }

      btn.disabled = false;
    }

    // Avvio
    caricaMessaggi();
    polling = setInterval(pollaNuovi, 4000);
  </script>

</body>
</html>
