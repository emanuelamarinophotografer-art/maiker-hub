<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Report Proprietario</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Georgia', serif; color: #1a2e42; background: white; font-size: 13px; }

  .page { max-width: 760px; margin: 0 auto; padding: 40px 48px; }

  /* HEADER */
  .header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 3px solid #1a2e42; padding-bottom: 20px; margin-bottom: 28px; }
  .header-brand { }
  .brand-name { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.04em; color: #1a2e42; }
  .brand-sub { font-size: 0.75rem; color: #666; margin-top: 3px; }
  .header-info { text-align: right; font-size: 0.78rem; color: #555; line-height: 1.7; }

  /* TITOLO REPORT */
  .report-title { margin-bottom: 28px; }
  .report-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #888; margin-bottom: 6px; }
  .report-immobile { font-size: 1.6rem; font-weight: 700; color: #1a2e42; line-height: 1.2; margin-bottom: 4px; }
  .report-sub { font-size: 0.85rem; color: #555; }

  /* SEZIONI */
  .sezione { margin-bottom: 28px; }
  .sezione-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #888; border-bottom: 1px solid #e0e0e0; padding-bottom: 6px; margin-bottom: 14px; }

  /* GRID METRICHE */
  .metriche-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .metrica { background: #f8f9fa; border-radius: 6px; padding: 12px 14px; }
  .metrica-val { font-size: 1.3rem; font-weight: 700; color: #1a2e42; }
  .metrica-val.ok { color: #27ae60; }
  .metrica-val.warn { color: #e67e22; }
  .metrica-val.bad { color: #c0392b; }
  .metrica-label { font-size: 0.65rem; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px; }

  /* TABELLA PORTALE */
  .portale-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .portale-box { border: 1px solid #e0e0e0; border-radius: 8px; padding: 14px 16px; }
  .portale-name { font-weight: 700; font-size: 0.85rem; margin-bottom: 10px; color: #1a2e42; }
  .portale-row { display: flex; justify-content: space-between; font-size: 0.8rem; padding: 3px 0; border-bottom: 1px solid #f0f0f0; }
  .portale-row:last-child { border-bottom: none; }
  .portale-row .lbl { color: #888; }
  .portale-row .val { font-weight: 600; }

  /* RICHIESTE */
  .richieste-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  .richieste-table th { text-align: left; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em; color: #888; padding: 6px 8px; border-bottom: 2px solid #e0e0e0; }
  .richieste-table td { padding: 7px 8px; border-bottom: 1px solid #f0f0f0; }
  .richieste-table tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.68rem; font-weight: 600; }
  .badge-visita { background: #e8f8f0; color: #27ae60; }
  .badge-interesse { background: #fef9e7; color: #b7860b; }
  .badge-info { background: #eaf2fb; color: #2980b9; }
  .badge-offerta { background: #fdf2f8; color: #8e44ad; }

  /* ANALISI MERCATO */
  .mercato-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.82rem; }
  .mercato-row:last-child { border-bottom: none; }
  .mercato-row .lbl { color: #555; }
  .mercato-row .val { font-weight: 700; }

  /* MESSAGGIO MARA */
  .mara-box { background: #f0f4f8; border-left: 3px solid #1a2e42; border-radius: 0 6px 6px 0; padding: 14px 16px; margin-bottom: 28px; }
  .mara-box-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: #888; margin-bottom: 6px; }
  .mara-box-text { font-size: 0.82rem; line-height: 1.6; color: #333; }

  /* FOOTER */
  .footer { border-top: 1px solid #e0e0e0; padding-top: 16px; margin-top: 32px; display: flex; justify-content: space-between; align-items: center; }
  .footer-contacts { font-size: 0.75rem; color: #666; line-height: 1.8; }
  .footer-logo { font-size: 0.7rem; color: #aaa; text-align: right; }
  .footer-note { font-size: 0.68rem; color: #aaa; text-align: center; margin-top: 10px; }

  /* EMPTY */
  .empty { color: #aaa; font-style: italic; font-size: 0.8rem; padding: 8px 0; }

  /* PRINT */
  @media print {
    body { font-size: 12px; }
    .page { padding: 24px 32px; }
    .no-print { display: none !important; }
    a { color: inherit; text-decoration: none; }
  }

  /* PRINT BUTTON */
  .print-bar { position: fixed; top: 16px; right: 16px; z-index: 999; display: flex; gap: 8px; }
  .btn-print { background: #1a2e42; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 0.85rem; cursor: pointer; font-family: inherit; }
  .btn-print:hover { background: #2c4a6e; }
</style>
</head>
<body>

<div class="print-bar no-print">
  <button class="btn-print" onclick="window.print()">🖨 Stampa / Salva PDF</button>
  <button class="btn-print" style="background:#555" onclick="window.close()">✕ Chiudi</button>
</div>

<div class="page" id="contenuto">
  <div style="text-align:center;color:#aaa;padding:60px 0">Caricamento report…</div>
</div>

<script>
const SB = 'https://lbizlnuzlesrkvsobzqz.supabase.co';
const KEY = 'sb_publishable_2Rd36YkPvlsQI1BkdY0PrQ_od0d115R';
const H = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json' };

function fmtEur(n) { return n != null ? '€ ' + Math.round(n).toLocaleString('it-IT') : '—'; }
function fmtN(n) { return n != null ? Math.round(n).toLocaleString('it-IT') : '—'; }
function fmtData(s) { if (!s) return '—'; const d = new Date(s); return d.toLocaleDateString('it-IT', {day:'2-digit',month:'long',year:'numeric'}); }
function fmtMese(s) { if (!s) return ''; const [y,m] = s.split('-'); const mesi=['','Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre']; return mesi[parseInt(m)] + ' ' + y; }

async function get(path) {
  const r = await fetch(`${SB}/rest/v1/${path}`, { headers: H });
  return r.ok ? r.json() : [];
}

async function init() {
  const params = new URLSearchParams(location.search);
  const ref = params.get('ref');
  const mese = params.get('mese') || '';
  if (!ref) { document.getElementById('contenuto').innerHTML = '<div style="color:#c00;padding:40px">Parametro ref mancante.</div>'; return; }

  // Il ref in analisi_portale è senza prefisso "016 - " (viene dal CSV)
  const refCorto = ref.replace(/^[\d\s\-]+/, '').trim();

  const [props, portaleRows, richiesteRows, proposteRows] = await Promise.all([
    get(`proprieta?ref=eq.${encodeURIComponent(ref)}&limit=1`),
    get(`analisi_portale?ref=eq.${encodeURIComponent(refCorto)}${mese?'&mese=eq.'+mese:'&order=mese.desc&limit=1'}`),
    get(`richieste?select=*&order=data_richiesta.desc`),
    get(`proposte?ref_proprieta=eq.${encodeURIComponent(ref)}&order=data_proposta.desc`)
  ]);

  const p = props[0];
  if (!p) { document.getElementById('contenuto').innerHTML = '<div style="color:#c00;padding:40px">Immobile non trovato.</div>'; return; }
  const m = portaleRows[0] || null;
  const meseLabel = m ? fmtMese(m.mese) : (mese ? fmtMese(mese) : '');

  // Richieste per questa proprietà (quelle che la citano o tutte da filtrare)
  const richieste = richiesteRows.filter(r => {
    if (r.immobili_proposti && r.immobili_proposti.includes(ref)) return true;
    return false;
  });

  // Giorni sul mercato
  const giorni = p.data_incarico ? Math.floor((new Date() - new Date(p.data_incarico)) / 86400000) : null;

  // Scarto benchmark
  const scarto = p.scarto_pct != null ? p.scarto_pct : null;
  let scartoClass = '';
  if (scarto !== null) { scartoClass = scarto <= 0 ? 'ok' : scarto <= 15 ? 'warn' : 'bad'; }

  // Totali portale
  const visteListeTot = (m?.idealista_visite_liste||0) + 0; // immobiliare non ha liste separate
  const visteDetTot = (m?.idealista_visite_dettaglio||0) + (m?.imm_visite_dettaglio||0);
  const contatti = (m?.idealista_contatti||0) + (m?.imm_messaggi||0);
  const preferiti = (m?.idealista_preferiti||0) + (m?.imm_salvati||0);

  document.getElementById('contenuto').innerHTML = `
    <!-- HEADER -->
    <div class="header">
      <div class="header-brand">
        <div class="brand-name">CENTURY 21 SILVER</div>
        <div class="brand-sub">Emanuela Marino · Agente Immobiliare</div>
      </div>
      <div class="header-info">
        <div><strong>Report mensile</strong> · ${meseLabel || new Date().toLocaleDateString('it-IT',{month:'long',year:'numeric'})}</div>
        <div>emarino@century21.it</div>
        <div>Maremma Toscana</div>
      </div>
    </div>

    <!-- TITOLO -->
    <div class="report-title">
      <div class="report-label">Aggiornamento mensile — Il tuo immobile</div>
      <div class="report-immobile">${p.titolo || ref}</div>
      <div class="report-sub">${[p.indirizzo, p.zona, p.comune].filter(Boolean).join(' · ')} ${giorni !== null ? '· <strong>'+giorni+' giorni sul mercato</strong>' : ''}</div>
    </div>

    <!-- KPI PRINCIPALI -->
    <div class="sezione">
      <div class="sezione-title">Attività portali — dati cumulativi dalla pubblicazione</div>
      <div class="metriche-grid">
        <div class="metrica"><div class="metrica-val">${fmtN(visteDetTot)}</div><div class="metrica-label">Visite scheda</div></div>
        <div class="metrica"><div class="metrica-val ${contatti>0?'ok':''}">${fmtN(contatti)}</div><div class="metrica-label">Contatti ricevuti</div></div>
        <div class="metrica"><div class="metrica-val">${fmtN(preferiti)}</div><div class="metrica-label">Salvati / Preferiti</div></div>
        <div class="metrica" title="Differenza tra il prezzo €/mq dell'immobile e il valore OMI di riferimento della zona">
          <div class="metrica-val ${scartoClass}">${scarto !== null ? (scarto > 0 ? '+' : '') + scarto + '%' : '—'}</div>
          <div class="metrica-label">Scarto da benchmark OMI</div>
          ${scarto !== null ? `<div style="font-size:0.62rem;color:#888;margin-top:3px">${scarto > 0 ? 'sopra' : 'sotto'} il valore OMI di zona</div>` : ''}
        </div>
      </div>
    </div>

    <!-- DETTAGLIO PORTALI -->
    ${m ? `
    <div class="sezione">
      <div class="sezione-title">Dettaglio per portale</div>
      <div class="portale-grid">
        ${m.presente_idealista ? `
        <div class="portale-box">
          <div class="portale-name">🔵 Idealista</div>
          <div class="portale-row"><span class="lbl">Visite lista</span><span class="val">${fmtN(m.idealista_visite_liste)}</span></div>
          <div class="portale-row"><span class="lbl">Visite scheda</span><span class="val">${fmtN(m.idealista_visite_dettaglio)}</span></div>
          <div class="portale-row"><span class="lbl">Preferiti</span><span class="val">${fmtN(m.idealista_preferiti)}</span></div>
          <div class="portale-row"><span class="lbl">Contatti</span><span class="val">${fmtN(m.idealista_contatti)}</span></div>
        </div>` : ''}
        ${m.presente_immobiliare ? `
        <div class="portale-box">
          <div class="portale-name">🟠 Immobiliare.it</div>
          <div class="portale-row"><span class="lbl">Visite scheda</span><span class="val">${fmtN(m.imm_visite_dettaglio)}</span></div>
          <div class="portale-row"><span class="lbl">Salvati</span><span class="val">${fmtN(m.imm_salvati)}</span></div>
          <div class="portale-row"><span class="lbl">Messaggi</span><span class="val">${fmtN(m.imm_messaggi)}</span></div>
          <div class="portale-row"><span class="lbl">Posizione</span><span class="val">${m.imm_posizione || '—'}${m.imm_pagina?' · '+m.imm_pagina:''}</span></div>
          <div class="portale-row"><span class="lbl">Qualità annuncio</span><span class="val">${m.imm_qualita_pct != null ? m.imm_qualita_pct+'%' : '—'}</span></div>
        </div>` : ''}
      </div>
    </div>` : `<div class="sezione"><div class="sezione-title">Dettaglio portali</div><div class="empty">Dati portale non ancora importati per questo mese.</div></div>`}

    <!-- ANALISI MERCATO -->
    <div class="sezione">
      <div class="sezione-title">Posizionamento rispetto al mercato</div>
      <div class="mercato-row"><span class="lbl">Prezzo richiesto</span><span class="val">${fmtEur(p.prezzo)}</span></div>
      ${p.mq ? `<div class="mercato-row"><span class="lbl">Superficie</span><span class="val">${p.mq} mq${p.prezzo && p.mq ? ' · ' + fmtEur(Math.round(p.prezzo/p.mq)) + '/mq' : ''}</span></div>` : ''}
      ${p.mq && p.prezzo ? `<div class="mercato-row"><span class="lbl">Prezzo €/mq dell'immobile</span><span class="val">${fmtEur(Math.round(parseFloat(p.prezzo)/p.mq))}/mq</span></div>` : ''}
      ${p.benchmark_mq ? `<div class="mercato-row"><span class="lbl">Valore OMI di riferimento zona</span><span class="val">${fmtEur(p.benchmark_mq)}/mq</span></div>` : ''}
      ${scarto !== null ? `<div class="mercato-row"><span class="lbl">Scarto dal benchmark OMI</span><span class="val ${scartoClass}" style="font-size:0.9rem">${scarto > 0 ? '+' : ''}${scarto}% ${scarto > 0 ? 'sopra' : 'sotto'} il valore OMI di zona — il benchmark OMI è il valore catastale minimo e non il prezzo di mercato effettivo</span></div>` : ''}
      ${p.data_incarico ? `<div class="mercato-row"><span class="lbl">Data incarico</span><span class="val">${fmtData(p.data_incarico)}</span></div>` : ''}
      ${p.scadenza ? `<div class="mercato-row"><span class="lbl">Scadenza incarico</span><span class="val">${fmtData(p.scadenza)}</span></div>` : ''}
    </div>

    <!-- PROPOSTE AD ACQUIRENTI -->
    <div class="sezione">
      <div class="sezione-title">Proposte ad acquirenti potenziali</div>
      ${proposteRows.length === 0
        ? '<div class="empty">Nessuna proposta registrata questo periodo.</div>'
        : `<table class="richieste-table">
            <thead><tr><th>Data</th><th>Cliente</th><th>Esito</th><th>Note</th></tr></thead>
            <tbody>${proposteRows.map(r => `
              <tr>
                <td>${fmtData(r.data_proposta)}</td>
                <td>${r.nome_cliente || '—'}</td>
                <td>${r.esito ? `<span class="badge badge-${r.esito}">${r.esito}</span>` : '—'}</td>
                <td>${r.note || ''}</td>
              </tr>`).join('')}
            </tbody>
          </table>`}
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <div class="footer-contacts">
        <strong>Emanuela Marino</strong><br>
        Century 21 Silver — Siver Group<br>
        Maremma Toscana<br>
        emarino@century21.it
      </div>

      <div class="footer-logo">
        Report generato il ${new Date().toLocaleDateString('it-IT')}<br>
        Century 21 Silver · Riservatezza garantita
      </div>
    </div>
    <div class="footer-note">Questo documento è riservato al proprietario e non può essere divulgato a terzi senza autorizzazione.</div>
  `;
}

init();
</script>
</body>
</html>
