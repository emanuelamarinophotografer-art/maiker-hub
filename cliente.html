<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ework — Scheda Cliente</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .scheda-header {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px 28px;
      margin-bottom: 20px;
      display: flex;
      align-items: flex-start;
      gap: 20px;
    }
    .scheda-avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--accent-bg);
      border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .scheda-info { flex: 1; }
    .scheda-nome { font-size: 1.3rem; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .scheda-contatti { display: flex; gap: 16px; font-size: 0.82rem; color: var(--text-muted); margin-bottom: 10px; flex-wrap: wrap; }
    .scheda-contatti a { color: var(--accent); text-decoration: none; }
    .scheda-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .cliente-stato { display: inline-block; font-size: 0.68rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
    .scheda-actions { display: flex; gap: 8px; }
    .btn-back { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; font-size: 0.82rem; font-family: inherit; font-weight: 600; cursor: pointer; color: var(--text-muted); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
    .btn-back:hover { border-color: var(--accent); color: var(--accent); }
    .btn-modifica { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 8px 14px; font-size: 0.82rem; font-family: inherit; font-weight: 600; cursor: pointer; }

    .scheda-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .info-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 18px 22px; }
    .info-card-title { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; font-weight: 600; }
    .info-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    .info-row:last-child { border-bottom: none; }
    .info-row .label { color: var(--text-muted); }
    .info-row .val { color: var(--text); font-weight: 500; }

    /* STORICO */
    .storico-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .attivita-input-wrap { display: flex; gap: 8px; margin-bottom: 16px; }
    .attivita-tipo { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: 0.85rem; font-family: inherit; color: var(--text); outline: none; }
    .attivita-input { flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; font-size: 0.88rem; font-family: inherit; font-weight: 500; color: var(--text); outline: none; }
    .attivita-input:focus { border-color: var(--accent); }
    .btn-add { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 9px 16px; font-size: 0.85rem; font-family: inherit; font-weight: 600; cursor: pointer; }

    .attivita-item { display: flex; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .attivita-item:last-child { border-bottom: none; }
    .att-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
    .att-body { flex: 1; }
    .att-testo { font-size: 0.88rem; color: var(--text); margin-bottom: 2px; }
    .att-meta { font-size: 0.72rem; color: var(--text-muted); }
    .att-del { background: none; border: none; color: var(--text-faint); cursor: pointer; font-size: 0.8rem; padding: 2px; }
    .att-del:hover { color: var(--danger); }

    /* STATI */
    .stato-potenziale { background: #e8f4fd; color: #2980b9; }
    .stato-incarico { background: #fef9e7; color: #d4a017; }
    .stato-trattativa { background: #fdf2e9; color: #e67e22; }
    .stato-venduto, .stato-chiuso { background: #eafaf1; color: #27ae60; }
    .stato-annullato, .stato-perso { background: #fdedec; color: #c0392b; }
    .stato-nuovo { background: #f0f0f0; color: #555; }
    .stato-visita { background: #e8f8f5; color: #1a8a72; }
    .stato-proposta { background: #f5eef8; color: #8e44ad; }

    @media (max-width: 900px) { .scheda-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <a href="index.html"><h1>Ework</h1></a>
      <div class="sub">Centro operativo</div>
    </div>
    <nav class="nav-section c-principale">
      <div class="nav-label">Principale</div>
      <a class="nav-item" href="index.html"><span class="icon">🎯</span> Centro di comando</a>
    </nav>
    <nav class="nav-section c-operativo">
      <div class="nav-label">Operativo</div>
      <a class="nav-item" href="attivita.html"><span class="icon">📅</span> Attività</a>
      <a class="nav-item" href="#"><span class="icon">🤖</span> Agenti</a>
      <a class="nav-item" href="chat.html"><span class="icon">💬</span> Chat</a>
    </nav>
    <nav class="nav-section c-lavoro">
      <div class="nav-label">Lavoro</div>
      <a class="nav-item active" href="clienti.html"><span class="icon">👤</span> Clienti</a>
      <a class="nav-item" href="proprieta.html"><span class="icon">🏡</span> Proprietà</a>
      <a class="nav-item" href="valutazione.html"><span class="icon">🧮</span> Valutazione</a>
      <a class="nav-item" href="ricerca.html"><span class="icon">🔍</span> Ricerca Immobili</a>
      <a class="nav-item" href="radar.html"><span class="icon">📡</span> Radar Lunedì</a>
      <a class="nav-item" href="incarico.html"><span class="icon">📋</span> Scheda Incarico</a>
    </nav>
    <nav class="nav-section c-contenuti">
      <div class="nav-label">Contenuti</div>
      <a class="nav-item" href="#"><span class="icon">📸</span> Social</a>
      <a class="nav-item" href="#"><span class="icon">🌿</span> Fonti</a>
    </nav>
    <div class="sidebar-bottom" id="dataOggi"></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h2 id="topbarNome">Scheda Cliente</h2>
      <div class="date" id="dataEstesa"></div>
    </div>

    <div class="content" id="contenuto">
      <div class="placeholder">Caricamento…</div>
    </div>
  </main>

  <script>
    const d = new Date();
    const giorni = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
    const mesi = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
    document.getElementById('dataOggi').textContent = giorni[d.getDay()] + ' ' + d.getDate() + ' ' + mesi[d.getMonth()];
    document.getElementById('dataEstesa').textContent = giorni[d.getDay()] + ' ' + d.getDate() + ' ' + mesi[d.getMonth()] + ' ' + d.getFullYear();

    const classeStato = { 'Potenziale':'stato-potenziale','Incarico preso':'stato-incarico','In trattativa':'stato-trattativa','Venduto':'stato-venduto','Annullato':'stato-annullato','Nuovo contatto':'stato-nuovo','Visita fatta':'stato-visita','Proposta':'stato-proposta','Chiuso':'stato-chiuso','Perso':'stato-perso' };
    const iconaTipo = { 'Chiamata':'📞', 'Email':'✉️', 'Visita':'🏡', 'Incontro':'🤝', 'Nota':'📝', 'WhatsApp':'💬' };

    const SB_URL = 'https://lbizlnuzlesrkvsobzqz.supabase.co';
    const SB_KEY = 'sb_publishable_2Rd36YkPvlsQI1BkdY0PrQ_od0d115R';
    const SB_H = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

    const params = new URLSearchParams(location.search);
    const clienteId = parseInt(params.get('id'));

    async function render() {
      const resC = await fetch(`${SB_URL}/rest/v1/clienti?id=eq.${clienteId}`, { headers: SB_H });
      const clienti = await resC.json();
      const cliente = clienti[0];
      if (!cliente) { document.getElementById('contenuto').innerHTML = '<div class="placeholder">Cliente non trovato.</div>'; return; }

      document.getElementById('topbarNome').textContent = cliente.nome;

      const resA = await fetch(`${SB_URL}/rest/v1/storico_clienti?cliente_id=eq.${clienteId}&order=created_at.desc`, { headers: SB_H });
      const attivita = await resA.json();

      const isProprietario = cliente.tipo === 'proprietari';

      document.getElementById('contenuto').innerHTML = `
        <div class="scheda-header">
          <div class="scheda-avatar">👤</div>
          <div class="scheda-info">
            <div class="scheda-nome">${cliente.nome} ${cliente.stella ? '⭐' : ''}</div>
            <div class="scheda-contatti">
              ${cliente.tel ? '<span>📞 <a href="tel:'+cliente.tel+'">'+cliente.tel+'</a></span>' : ''}
              ${cliente.email ? '<span>✉️ <a href="mailto:'+cliente.email+'">'+cliente.email+'</a></span>' : ''}
            </div>
            <div class="scheda-meta">
              <span class="cliente-stato ${classeStato[cliente.stato] || ''}">${cliente.stato}</span>
              <span style="font-size:0.75rem;color:var(--text-muted)">${isProprietario ? 'Proprietario' : 'Acquirente'}</span>
            </div>
          </div>
          <div class="scheda-actions">
            <a class="btn-back" href="clienti.html">← Clienti</a>
          </div>
        </div>

        <div class="scheda-grid">
          <div class="info-card">
            <div class="info-card-title">Dettagli</div>
            ${isProprietario && cliente.immobile ? '<div class="info-row"><span class="label">Immobile</span><span class="val">'+cliente.immobile+'</span></div>' : ''}
            ${!isProprietario && cliente.budget ? '<div class="info-row"><span class="label">Budget</span><span class="val">'+cliente.budget+'</span></div>' : ''}
            ${!isProprietario && cliente.zona ? '<div class="info-row"><span class="label">Zona cercata</span><span class="val">'+cliente.zona+'</span></div>' : ''}
            ${cliente.aggiornato ? '<div class="info-row"><span class="label">Ultimo aggiornamento</span><span class="val">'+cliente.aggiornato+'</span></div>' : ''}
          </div>
          <div class="info-card">
            <div class="info-card-title">Note</div>
            <div style="font-size:0.88rem;color:var(--text);line-height:1.6;">${cliente.note || '<span style="color:var(--text-faint);font-style:italic">Nessuna nota.</span>'}</div>
          </div>
        </div>

        <div class="info-card">
          <div class="storico-header">
            <div class="info-card-title" style="margin-bottom:0">Storico attività</div>
          </div>
          <div class="attivita-input-wrap">
            <select class="attivita-tipo" id="att_tipo">
              <option>Chiamata</option><option>WhatsApp</option><option>Email</option>
              <option>Visita</option><option>Incontro</option><option>Nota</option>
            </select>
            <input class="attivita-input" type="text" id="att_testo" placeholder="Descrivi l'attività…" />
            <button class="btn-add" onclick="aggiungiAttivita()">+ Aggiungi</button>
          </div>
          <div id="listaAttivita">
            ${attivita.length === 0 ? '<div class="placeholder">Nessuna attività registrata.</div>' :
              attivita.map(a => `
                <div class="attivita-item">
                  <div class="att-icon">${iconaTipo[a.tipo] || '📝'}</div>
                  <div class="att-body">
                    <div class="att-testo">${a.testo}</div>
                    <div class="att-meta">${a.tipo} · ${new Date(a.created_at).toLocaleDateString('it-IT')}</div>
                  </div>
                  <button class="att-del" onclick="eliminaAttivita(${a.id})">✕</button>
                </div>
              `).join('')}
          </div>
        </div>
      `;

      document.getElementById('att_testo').addEventListener('keydown', e => { if (e.key === 'Enter') aggiungiAttivita(); });
    }

    async function aggiungiAttivita() {
      const tipo = document.getElementById('att_tipo').value;
      const testo = document.getElementById('att_testo').value.trim();
      if (!testo) return;
      await fetch(`${SB_URL}/rest/v1/storico_clienti`, { method: 'POST', headers: SB_H, body: JSON.stringify({ cliente_id: clienteId, tipo, testo }) });
      document.getElementById('att_testo').value = '';
      render();
    }

    async function eliminaAttivita(id) {
      await fetch(`${SB_URL}/rest/v1/storico_clienti?id=eq.${id}`, { method: 'DELETE', headers: SB_H });
      render();
    }

    render();
  </script>

</body>
</html>
