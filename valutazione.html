  <style>
    .val-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
    .val-form { display: flex; flex-direction: column; gap: 0; }

    .sezione { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 22px 24px; margin-bottom: 16px; }
    .sezione-titolo { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); font-weight: 600; margin-bottom: 16px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-row-1 { margin-bottom: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 0.72rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .form-input, .form-select { background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 9px 12px; font-size: 0.9rem; font-family: inherit; font-weight: 500; color: var(--text); outline: none; width: 100%; box-sizing: border-box; }
    .form-input:focus, .form-select:focus { border-color: var(--accent); }

    .toggle-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .toggle-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 7px 14px; font-size: 0.82rem; font-family: inherit; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
    .toggle-btn.on { background: var(--accent); border-color: var(--accent); color: white; }

    .btn-calcola { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 12px 24px; font-size: 0.95rem; font-family: inherit; font-weight: 600; cursor: pointer; width: 100%; margin-top: 4px; }
    .btn-calcola:hover { opacity: 0.88; }

    /* RISULTATO */
    .risultato { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 24px; position: sticky; top: 20px; }
    .ris-label { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); font-weight: 600; margin-bottom: 16px; }
    .ris-range { text-align: center; margin-bottom: 20px; }
    .ris-range .range-val { font-size: 1.9rem; font-weight: 700; color: var(--text); }
    .ris-range .range-sep { font-size: 1.2rem; color: var(--text-muted); margin: 0 6px; }
    .ris-range .range-sub { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }

    .ris-breakdown { border-top: 1px solid var(--border); padding-top: 16px; }
    .ris-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.85rem; border-bottom: 1px solid var(--border); }
    .ris-row:last-child { border-bottom: none; }
    .ris-row .r-label { color: var(--text-muted); }
    .ris-row .r-val { color: var(--text); font-weight: 500; }
    .ris-row.totale { font-weight: 600; font-size: 0.9rem; color: var(--accent); }

    .omi-nota { font-size: 0.72rem; color: var(--text-faint); margin-top: 14px; line-height: 1.5; border-top: 1px solid var(--border); padding-top: 12px; }

    .placeholder-ris { text-align: center; color: var(--text-faint); font-size: 0.88rem; padding: 40px 0; }

    @media (max-width: 900px) { .val-grid { grid-template-columns: 1fr; } .risultato { position: static; } }
  </style>
</head>

            </div>

    // Coefficienti stato
    const COEFF_STATO = { ottimo: 1.0, buono: 0.87, discreto: 0.74, daristrutturare: 0.58 };

    // Valore terreno €/mq
    const TERRENO_MQ = { oliveto: 3.2, vigneto: 9.0, seminativo: 1.2, bosco: 0.5, misto: 2.5, orto: 2.0, none: 0 };

    // Stato toggle
    const toggleState = { stato: 'ottimo', vista: 'nessuna', piscina: 'no', accesso: 'comodo' };

    function setToggle(gruppo, valore, el) {
      toggleState[gruppo] = valore;
      el.closest('.toggle-row').querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('on'));
      el.classList.add('on');
    }

    function aggiornaZone() {
      const comune = document.getElementById('f_comune').value;
      const sel = document.getElementById('f_zona');
      sel.innerHTML = '';
      if (!comune || !OMI[comune]) {
        sel.innerHTML = '<option value="">— prima seleziona il comune —</option>';
        return;
      }
      OMI[comune].zone.forEach(z => {
        sel.innerHTML += `<option value="${z.val}">${z.label}</option>`;
      });
    }

    function fmt(n) {
      return Math.round(n).toLocaleString('it-IT') + ' €';
    }

    function calcola() {
      const comune = document.getElementById('f_comune').value;
      const zona = document.getElementById('f_zona').value;
      const tipologia = document.getElementById('f_tipologia').value;
      const mq = parseFloat(document.getElementById('f_mq').value) || 0;
      const terrenoHa = parseFloat(document.getElementById('f_terreno_ha').value) || 0;
      const terrenoTipo = document.getElementById('f_terreno_tipo').value;
      const annesso = parseFloat(document.getElementById('f_annesso').value) || 0;

      if (!comune || !zona || !mq) {
        alert('Compila almeno: comune, zona e superficie.');
        return;
      }

      const prezzi = OMI[comune].prezzi[zona][tipologia];
      const coeffStato = COEFF_STATO[toggleState.stato];

      // BASE FABBRICATO
      const baseMin = prezzi[0] * mq * coeffStato;
      const baseMax = prezzi[1] * mq * coeffStato;

      // ANNESSO/DEPENDANCE (50% del valore rustico della stessa zona)
      const annMin = annesso > 0 ? annesso * OMI[comune].prezzi[zona].rustico[0] * 0.5 * coeffStato : 0;
      const annMax = annesso > 0 ? annesso * OMI[comune].prezzi[zona].rustico[1] * 0.5 * coeffStato : 0;

      // TERRENO
      const mqTerreno = terrenoHa * 10000;
      const valTerreno = mqTerreno * TERRENO_MQ[terrenoTipo] || 0;

      // PISCINA
      const valPiscina = toggleState.piscina === 'si' ? 22000 : 0;

      // VISTA
      let coeffVista = 1.0;
      if (toggleState.vista === 'colline') coeffVista = 1.06;
      if (toggleState.vista === 'mare') coeffVista = 1.14;

      // ACCESSO
      let coeffAccesso = 1.0;
      if (toggleState.accesso === 'sterrato') coeffAccesso = 0.96;
      if (toggleState.accesso === 'difficile') coeffAccesso = 0.90;

      // TOTALE
      const totMin = ((baseMin + annMin) * coeffVista * coeffAccesso) + valTerreno + valPiscina;
      const totMax = ((baseMax + annMax) * coeffVista * coeffAccesso) + valTerreno + valPiscina;

      const comuneLabel = document.getElementById('f_comune').selectedOptions[0].text;
      const zonaLabel = document.getElementById('f_zona').selectedOptions[0].text;
      const tipoLabel = document.getElementById('f_tipologia').selectedOptions[0].text;
      const statoLabel = document.querySelector('#stato_toggle .toggle-btn.on').textContent;

      const vistaLabel = { nessuna:'—', colline:'Colline / Campagna (+6%)', mare:'Vista mare (+14%)' }[toggleState.vista];
      const accessoLabel = { comodo:'—', sterrato:'Sterrato (-4%)', difficile:'Difficile / Isolato (-10%)' }[toggleState.accesso];

      document.getElementById('risultatoBox').innerHTML = `
        <div class="ris-label">Valutazione stimata</div>
        <div class="ris-range">
          <div>
            <span class="range-val">${fmt(totMin)}</span>
            <span class="range-sep">–</span>
            <span class="range-val">${fmt(totMax)}</span>
          </div>
          <div class="range-sub">${comuneLabel} · ${zonaLabel}</div>
        </div>

        <div class="ris-breakdown">
          <div class="ris-row">
            <span class="r-label">${tipoLabel} (${mq} mq · ${statoLabel})</span>
            <span class="r-val">${fmt(baseMin)} – ${fmt(baseMax)}</span>
          </div>
          ${annesso > 0 ? `<div class="ris-row"><span class="r-label">Annesso / Dependance (${annesso} mq)</span><span class="r-val">${fmt(annMin)} – ${fmt(annMax)}</span></div>` : ''}
          ${valTerreno > 0 ? `<div class="ris-row"><span class="r-label">Terreno ${terrenoHa} ha (${document.getElementById('f_terreno_tipo').selectedOptions[0].text})</span><span class="r-val">${fmt(valTerreno)}</span></div>` : ''}
          ${valPiscina > 0 ? `<div class="ris-row"><span class="r-label">Piscina</span><span class="r-val">+ ${fmt(valPiscina)}</span></div>` : ''}
          ${toggleState.vista !== 'nessuna' ? `<div class="ris-row"><span class="r-label">Vista</span><span class="r-val">${vistaLabel}</span></div>` : ''}
          ${toggleState.accesso !== 'comodo' ? `<div class="ris-row"><span class="r-label">Accessibilità</span><span class="r-val">${accessoLabel}</span></div>` : ''}
          <div class="ris-row totale">
            <span class="r-label">Totale stimato</span>
            <span class="r-val">${fmt(totMin)} – ${fmt(totMax)}</span>
          </div>
        </div>

        <div class="omi-nota">
          📊 Dati OMI Agenzia delle Entrate — 2° semestre 2025.<br>
          Prezzi al mq: ${prezzi[0].toLocaleString()} – ${prezzi[1].toLocaleString()} €/mq (${tipoLabel}, ${zonaLabel}).<br>
          Valori indicativi per uso professionale interno. Aggiornare semestralmente con i nuovi dati OMI.
        </div>
      `;
    }

    aggiornaZone();
  </script>
